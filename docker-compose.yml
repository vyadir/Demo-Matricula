services:
  db:
    image: postgres:16-alpine
    container_name: matricula_db
    environment:
      POSTGRES_DB: matricula_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d matricula_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: matricula_web
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

volumes:
  postgres_data:
